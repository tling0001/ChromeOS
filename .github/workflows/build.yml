name: Build ChromeOS

on:
  workflow_dispatch:
    inputs:
      codename:
        type: choice
        description: Target ChromeOS architecture configuration
        required: true
        options: [rammus, voxel, gumboz, jinlon, shyvana, leona, samus]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip tar pv cgpt coreutils

      - name: Build Genuine ChromeOS Image
        run: |
          chmod +x build.sh

          # Universal base recovery path
          export RECOVERY_URL="https://dl.google.com/dl/edgedl/chromeos/recovery/chromeos_16610.57.0_volteer_recovery_stable-channel_VolteerMPKeys-v14.bin.zip"

          # Run the build script
          ./build.sh ${{ inputs.codename }}

      - name: Compress and Clean Artifact
        run: |
          # Verify file sizes to guarantee system content is written
          ls -lh chromeos/chromeos.img
          
      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: chromeos-${{ inputs.codename }}
          path: chromeos/chromeos.img
