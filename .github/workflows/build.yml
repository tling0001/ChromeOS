name: Build ChromeOS

on:
  workflow_dispatch:
    inputs:
      codename:
        type: choice
        description: Target ChromeOS architecture configuration
        required: true
        options: [rammus, voxel, gumboz, jinlon, shyvana, leona, samus]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip tar pv cgpt kpartx coreutils

      - name: Pre-Allocate Block Space & Force Device Maps
        run: |
          # Allocate a true 15GB raw block zero matrix file to prevent structural allocation dropping
          mkdir -p chromeos
          dd if=/dev/zero of=chromeos/chromeos.img bs=1M count=15360 status=progress
          
          # Initialize loop layers and activate structural kernel mapping bindings
          sudo losetup -f chromeos/chromeos.img
          sudo udevadm settle

      - name: Build ChromeOS
        run: |
          chmod +x build.sh

          # Universal base recovery path
          export RECOVERY_URL="https://dl.google.com/dl/edgedl/chromeos/recovery/chromeos_16640.61.0_rammus_recovery_stable-channel_RammusMPKeys-v9.bin.zip"

          # Execute build script under superuser context to write deep nested sectors
          sudo -E ./build.sh ${{ inputs.codename }}

      - name: Post-Build Partition Table Fix
        if: always()
        run: |
          # Clean up any lingering mapper device bindings on the runner
          sudo kpartx -d chromeos/chromeos.img || true
          sudo losetup -D || true

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: chromeos-${{ inputs.codename }}
          path: chromeos/chromeos.img
