name: Build ChromeOS

on:
  workflow_dispatch:
    inputs:
      codename:
        type: choice
        description: ChromeOS device codename (still used by brunch logic)
        required: true
        options: [voxel, gumboz, jinlon, shyvana, leona, samus]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip tar pv cgpt

      - name: Build ChromeOS
        run: |
          chmod +x build.sh

          # ✅ Inject fixed recovery URL
          export RECOVERY_URL="https://dl.google.com/dl/edgedl/chromeos/recovery/chromeos_16640.61.0_rammus_recovery_stable-channel_RammusMPKeys-v9.bin.zip"

          ./build.sh ${{ inputs.codename }}

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: chromeos-${{ inputs.codename }}
          path: chromeos/chromeos.img
