name: Build ChromeOS

on:
  workflow_dispatch:
    inputs:
      codename:
        type: choice
        description: Target ChromeOS architecture config (Uses Rammus platform engine)
        required: true
        options: [rammus, voxel, gumboz, jinlon, shyvana, leona, samus]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip tar pv cgpt kmod

      - name: Enable Loopback Partition Scanning
        run: |
          # Force the GitHub runner kernel to handle nested disk partitions
          sudo modprobe loop max_part=15
          sudo sysctl -w kernel.unprivileged_userns_clone=1

      - name: Build ChromeOS
        run: |
          chmod +x build.sh

          # ✅ Working URL for Rammus base image
          export RECOVERY_URL="https://google.com"

          # Run the build tool using sudo to interact with the freshly mapped /dev/loop block states
          sudo -E ./build.sh ${{ inputs.codename }}

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: chromeos-${{ inputs.codename }}
          path: chromeos/chromeos.img
