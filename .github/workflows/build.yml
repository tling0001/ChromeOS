name: Build ChromeOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 6

      - name: Download ChromeOS image
        run: |
          set -e

          URL="https://dl.google.com/dl/edgedl/chromeos/recovery/chromeos_16640.61.0_volteer_recovery_stable-channel_VolteerMPKeys-v14.bin.zip"

          echo "Downloading ChromeOS image..."
          wget --tries=3 --timeout=30 -O chromeos.zip "$URL"

          echo "Extracting image..."
          unzip chromeos.zip

          IMG=$(ls *.bin | head -n 1)

          if [ -z "$IMG" ]; then
            echo "::error::No .bin file found after extraction"
            exit 1
          fi

          mkdir -p chromeos
          mv "$IMG" chromeos/chromeos.img

          echo "✅ Image ready"

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: chromeos-volteer
          path: chromeos/chromeos.img
